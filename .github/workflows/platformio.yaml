name: PlatformIO CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
      
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio intelhex
        
    - name: Run PlatformIO
      working-directory: SRC/ShineWiFi-ModBus
      run: pio run -e ShineWifiX -e ShineWifiS
      
    - name: Upload bin files
      uses: actions/upload-artifact@v4
      with:
        name: firmware-pack
        path: SRC/ShineWiFi-ModBus/.pio/build/**/*.bin
